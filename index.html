<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyrra TMS</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <section id="auth-screen" class="auth-screen" hidden>
      <form id="login-form" class="login-panel">
        <div class="brand login-brand">
          <span class="brand-mark">C</span>
          <div>
            <strong>Cyrra TMS</strong>
            <small>Operations login</small>
          </div>
        </div>
        <label>
          <span>Email</span>
          <input id="login-email" name="email" type="email" autocomplete="email" required />
        </label>
        <label>
          <span>Password</span>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required />
        </label>
        <div class="auth-actions">
          <button type="submit">Log in</button>
          <button id="signup-button" type="button">Create test account</button>
        </div>
        <p id="login-message" class="form-message"></p>
      </form>
    </section>

    <div id="app-shell" class="app-shell" hidden>
      <aside class="sidebar" aria-label="Main navigation">
        <div class="brand">
          <span class="brand-mark">Cy</span>
          <div>
            <strong>Cyrra TMS</strong>
            <small>Transport suite</small>
          </div>
        </div>

        <nav class="nav-list">
          <span class="nav-section">Home</span>
          <a class="active" href="#dashboard" data-route="dashboard">Dashboard</a>
          <a href="#loads" data-route="loads">Orders / Loads</a>
          <a href="#dispatch" data-route="dispatch">Dispatch Board</a>
          <a href="#tracking" data-route="tracking">Fleet Map</a>
          <span class="nav-section">Operations</span>
          <a href="#drivers" data-route="drivers">Drivers</a>
          <a href="#equipment" data-route="equipment">Equipment</a>
          <a href="#customers" data-route="customers">Customers</a>
          <a href="#carriers" data-route="carriers">Carriers</a>
          <span class="nav-section">Back office</span>
          <a href="#documents" data-route="documents">Documents</a>
          <a href="#billing" data-route="billing">Billing</a>
          <a href="#reports" data-route="reports">Reports</a>
          <a href="#settings" data-route="settings">Settings</a>
        </nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <label class="search-box">
            <span>Search</span>
            <input id="global-search" type="search" placeholder="Load, customer, driver, truck, invoice..." />
          </label>
          <div class="topbar-actions">
            <button id="refresh-data" type="button">Refresh</button>
            <button id="add-order-button" type="button">Add Order</button>
            <button id="logout-button" type="button">Logout</button>
            <span class="user-avatar">MS</span>
          </div>
        </header>

        <div id="page-root"></div>

      </main>
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
